# =============================================================================
# PeriSquash — Nginx server block (Debian + Nginx, detrás de Cloudflare)
# Copia a /etc/nginx/sites-available/perisquash.conf, enlaza a sites-enabled/
# y recarga:  sudo nginx -t && sudo systemctl reload nginx
# Ajusta server_name, root y rutas de certificado a tu entorno.
# =============================================================================

# --- HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name perisquash.mx www.perisquash.mx;
    return 301 https://perisquash.mx$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name perisquash.mx www.perisquash.mx;

    root /var/www/perisquash;
    index index.html;

    # --- SSL (Cloudflare Origin Cert o Let's Encrypt) ---
    ssl_certificate     /etc/ssl/perisquash/fullchain.pem;
    ssl_certificate_key /etc/ssl/perisquash/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # www → apex
    if ($host = www.perisquash.mx) { return 301 https://perisquash.mx$request_uri; }

    # --- Compresión gzip (no re-comprime woff2/webp/jpg, ya comprimidos) ---
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/manifest+json;

    # --- Brotli (descomenta si tienes el módulo ngx_brotli compilado) ---
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json
    #              image/svg+xml application/xml;

    # --- Cabeceras de seguridad ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- HTML: siempre fresco ---
    location = / {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # --- Fuentes: caché de 1 año + CORS (las usa @font-face) ---
    location ~* \.woff2$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        types { font/woff2 woff2; }
        access_log off;
    }

    # --- Imágenes / video / CSS / JS: caché de 30 días ---
    location ~* \.(?:webp|jpg|jpeg|png|gif|ico|svg|mp4|css|js)$ {
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
